<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1"
     width="297mm" height="210mm" viewBox="0 0 297 210">

  <!-- Outer sheet border -->
  <rect x="0" y="0" width="297" height="210" fill="none" stroke="black" stroke-width="0.3"/>

  <!-- =============================================================== -->
  <!-- Region rectangles (all invisible: fill=none, stroke=none).       -->
  <!-- Each drawing type composites its own subset into these bboxes.   -->
  <!-- =============================================================== -->

  <!-- Fab drawing regions -->
  <rect id="board-view"     x="5"   y="5"  width="160" height="140" fill="none" stroke="none"/>
  <rect id="render-3d"      x="168" y="5"  width="57"  height="80"  fill="none" stroke="none"/>
  <rect id="drill-table"    x="228" y="5"  width="64"  height="40"  fill="none" stroke="none"/>
  <rect id="stackup-table"  x="228" y="48" width="64"  height="40"  fill="none" stroke="none"/>
  <rect id="fab-notes"      x="228" y="91" width="64"  height="60"  fill="none" stroke="none"/>

  <!-- Assembly drawing regions (overlap fab regions by design) -->
  <rect id="front-view"     x="5"   y="5"  width="140" height="150" fill="none" stroke="none"/>
  <rect id="back-view"      x="148" y="5"  width="140" height="150" fill="none" stroke="none"/>
  <rect id="assembly-notes" x="228" y="91" width="64"  height="60"  fill="none" stroke="none"/>

  <!-- =============================================================== -->
  <!-- Bottom strip divider: separates drawing area from blocks below.  -->
  <!-- =============================================================== -->
  <line x1="0" y1="155" x2="297" y2="155" stroke="black" stroke-width="0.3"/>

  <!-- =============================================================== -->
  <!-- Revision history table: x=0, y=155, w=147, h=55                  -->
  <!-- Columns: REV (0-20), EC (20-50), DESCRIPTION (50-147)            -->
  <!-- Rows:    header (155-163), row1 (163-178), row2 (178-193),       -->
  <!--          row3 (193-208).                                         -->
  <!-- =============================================================== -->

  <!-- Outer box -->
  <rect x="0" y="155" width="147" height="55" fill="none" stroke="black" stroke-width="0.3"/>

  <!-- Vertical column dividers -->
  <line x1="20"  y1="155" x2="20"  y2="210" stroke="black" stroke-width="0.3"/>
  <line x1="50"  y1="155" x2="50"  y2="210" stroke="black" stroke-width="0.3"/>

  <!-- Horizontal row dividers -->
  <line x1="0" y1="163" x2="147" y2="163" stroke="black" stroke-width="0.3"/>
  <line x1="0" y1="178" x2="147" y2="178" stroke="black" stroke-width="0.3"/>
  <line x1="0" y1="193" x2="147" y2="193" stroke="black" stroke-width="0.3"/>

  <!-- Header labels -->
  <text x="10"  y="160.5" font-size="2.5" font-weight="bold" text-anchor="middle">REV</text>
  <text x="35"  y="160.5" font-size="2.5" font-weight="bold" text-anchor="middle">EC</text>
  <text x="98"  y="160.5" font-size="2.5" font-weight="bold" text-anchor="middle">DESCRIPTION</text>

  <!-- Row 1 (newest) -->
  <text x="10"  y="171" font-size="3" text-anchor="middle">{{REV_1}}</text>
  <text x="35"  y="171" font-size="3" text-anchor="middle">{{EC_1}}</text>
  <text x="52"  y="171" font-size="3">{{DESC_1}}</text>

  <!-- Row 2 -->
  <text x="10"  y="186" font-size="3" text-anchor="middle">{{REV_2}}</text>
  <text x="35"  y="186" font-size="3" text-anchor="middle">{{EC_2}}</text>
  <text x="52"  y="186" font-size="3">{{DESC_2}}</text>

  <!-- Row 3 -->
  <text x="10"  y="201" font-size="3" text-anchor="middle">{{REV_3}}</text>
  <text x="35"  y="201" font-size="3" text-anchor="middle">{{EC_3}}</text>
  <text x="52"  y="201" font-size="3">{{DESC_3}}</text>

  <!-- =============================================================== -->
  <!-- Title block: x=147, y=155, w=150, h=55                           -->
  <!-- Row A (155-165, h=10): COMPANY                                   -->
  <!-- Row B (165-185, h=20): TITLE                                     -->
  <!-- Row C (185-200, h=15): DRAWN_BY | DATE | REV | PAGE              -->
  <!-- Row D (200-210, h=10): FILENAME | CONFIDENTIALITY                -->
  <!-- =============================================================== -->

  <!-- Outer box -->
  <rect x="147" y="155" width="150" height="55" fill="none" stroke="black" stroke-width="0.3"/>

  <!-- Horizontal row dividers -->
  <line x1="147" y1="165" x2="297" y2="165" stroke="black" stroke-width="0.3"/>
  <line x1="147" y1="185" x2="297" y2="185" stroke="black" stroke-width="0.3"/>
  <line x1="147" y1="200" x2="297" y2="200" stroke="black" stroke-width="0.3"/>

  <!-- Row C vertical dividers: 4 equal cells of 37.5mm each -->
  <line x1="184.5" y1="185" x2="184.5" y2="200" stroke="black" stroke-width="0.3"/>
  <line x1="222"   y1="185" x2="222"   y2="200" stroke="black" stroke-width="0.3"/>
  <line x1="259.5" y1="185" x2="259.5" y2="200" stroke="black" stroke-width="0.3"/>

  <!-- Row D vertical divider -->
  <line x1="222" y1="200" x2="222" y2="210" stroke="black" stroke-width="0.3"/>

  <!-- Row A: COMPANY -->
  <text x="150" y="159" font-size="2.5" font-weight="bold">COMPANY:</text>
  <text x="150" y="163.5" font-size="3">{{COMPANY}}</text>

  <!-- Row B: TITLE -->
  <text x="150" y="169" font-size="2.5" font-weight="bold">TITLE:</text>
  <text x="222" y="178" font-size="3" text-anchor="middle">{{TITLE}}</text>

  <!-- Row C: DRAWN_BY | DATE | REV | PAGE -->
  <text x="150"   y="189" font-size="2.5" font-weight="bold">DRAWN BY:</text>
  <text x="150"   y="197" font-size="3">{{DRAWN_BY}}</text>

  <text x="187.5" y="189" font-size="2.5" font-weight="bold">DATE:</text>
  <text x="187.5" y="197" font-size="3">{{DATE}}</text>

  <text x="225"   y="189" font-size="2.5" font-weight="bold">REV:</text>
  <text x="225"   y="197" font-size="3">{{REV}}</text>

  <text x="262.5" y="189" font-size="2.5" font-weight="bold">PAGE:</text>
  <text x="262.5" y="197" font-size="3">{{PAGE}}</text>

  <!-- Row D: FILENAME | CONFIDENTIALITY -->
  <text x="150" y="204" font-size="2.5" font-weight="bold">FILE:</text>
  <text x="160" y="204" font-size="3">{{FILENAME}}</text>

  <text x="225" y="204" font-size="2.5" font-weight="bold">CONF:</text>
  <text x="236" y="204" font-size="3">{{CONFIDENTIALITY}}</text>

</svg>
